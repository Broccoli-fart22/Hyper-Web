<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar - HyperWeb</title>
  <link rel="stylesheet" href="../Styles.css">
  <style>
    .desc-container { max-width: 800px; margin: 40px auto; background: var(--panel); padding: 30px; border-radius: var(--radius); box-shadow: var(--glow); line-height: 1.6; }
    .desc-container h2 { font-size: 1.8rem; margin-bottom: 15px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .desc-container p { color: var(--muted); font-size: 1.1rem; margin-bottom: 20px; }
    .desc-container a { display: inline-block; padding: 12px 18px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #061223; font-weight: 600; border-radius: var(--radius); text-decoration: none; transition: transform 0.2s ease; }
    .desc-container a:hover { transform: translateY(-3px); box-shadow: 0 0 12px rgba(124, 92, 255, 0.6), 0 0 28px rgba(90, 199, 255, 0.4); }
  </style>
</head>
<body>
  <header>
    <h1>Calendar</h1>
    <p>Part of HyperWeb Tools</p>
  </header>
  <main>
    <div class="desc-container">
      <h2>About</h2>
      <p>Stay organized and keep track of important dates.</p>
      <h2>Features</h2>
      <p>• Monthly & daily views<br>• Event management<br>• Minimal interface</p>
      <a href="../cal/cal.html">Open Calendar</a>
    </div>
  </main>
  <footer><p>&copy; 2025 HyperWeb — All rights reserved.</p></footer>
</body>
</html>
