    <main class="container">
        <a href="trans/trans.html" class="btn" data-desc="descriptions/translator.html">Translator</a>
        <a href="calculator/calculator.html" class="btn" data-desc="descriptions/calculator.html">Calculator</a>

    <script>
        // Add right-click event for buttons
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('contextmenu', function (e) {
                e.preventDefault(); // Stop normal right-click menu
                const descPage = this.getAttribute('data-desc');
                if (descPage) {
                    window.open(descPage, '_blank'); // Open description in new tab
                }
            });
        });
